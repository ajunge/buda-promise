name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s%n%b")
          fi

          # Skip if there are no new commits worth releasing
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Skip if last commit is itself a version bump
          if git log -1 --pretty=format:"%s" | grep -q "^chore: release"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          BUMP=patch
          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?[!]?:"; then
            BUMP=minor
          fi
          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP=major
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        if: steps.bump.outputs.skip == 'false'
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: release ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main --follow-tags

      - name: Publish to npm
        if: steps.bump.outputs.skip == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.bump.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
